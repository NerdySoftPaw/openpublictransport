name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Prepare Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $TAG_VERSION"
          jq --arg v "$TAG_VERSION" '.version = $v' custom_components/openpublictransport/manifest.json > tmp.json
          mv tmp.json custom_components/openpublictransport/manifest.json

      - name: Commit version to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/openpublictransport/manifest.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Set version to ${GITHUB_REF#refs/tags/v}"
          git push origin main

      - name: Update tag to include version commit
        run: |
          git tag -f ${GITHUB_REF#refs/tags/}
          git push origin ${GITHUB_REF#refs/tags/} --force

      - name: Create zip file
        run: |
          cd custom_components
          zip -r ../openpublictransport.zip openpublictransport/

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./openpublictransport.zip
          asset_name: openpublictransport.zip
          asset_content_type: application/zip
