site_name: Public Transport Integration
site_description: Multi-Provider Public Transport Home Assistant Integration for 23 transit networks across Germany, Switzerland, Austria, Sweden, Ireland, and worldwide
repo_url: https://github.com/NerdySoftPaw/openpublictransport
repo_name: NerdySoftPaw/openpublictransport

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Installation: installation.md
  - Migration Guide: migration.md
  - Configuration: configuration.md
  - Providers:
      - Overview: providers/index.md
      - VRR (Rhein-Ruhr): providers/vrr.md
      - KVV (Karlsruhe): providers/kvv.md
      - HVV (Hamburg): providers/hvv.md
      - BVG (Berlin): providers/bvg.md
      - MVV (München): providers/mvv.md
      - VVS (Stuttgart): providers/vvs.md
      - VGN (Nürnberg): providers/vgn.md
      - VAG (Freiburg): providers/vagfr.md
      - RMV (Frankfurt): providers/rmv.md
      - VRN (Rhein-Neckar): providers/vrn.md
      - VVO (Dresden): providers/vvo.md
      - DING (Ulm): providers/ding.md
      - AVV (Augsburg): providers/avv.md
      - RVV (Regensburg): providers/rvv.md
      - BSVG (Braunschweig): providers/bsvg.md
      - NWL (Westfalen-Lippe): providers/nwl.md
      - NVBW (Baden-Württemberg): providers/nvbw.md
      - BEG (Bayern): providers/beg.md
      - SBB (Schweiz): providers/sbb.md
      - ÖBB (Österreich): providers/oebb.md
      - Trafiklab (Sweden): providers/trafiklab.md
      - NTA (Ireland): providers/nta.md
      - Transitous (Worldwide): providers/transitous.md
  - Sensors & Attributes: sensors.md
  - Services: services.md
  - Trip Planner: trip-planner.md
  - Dashboard Examples: dashboard.md
  - Automations: automations.md
  - Changelog: changelog.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NerdySoftPaw/openpublictransport
