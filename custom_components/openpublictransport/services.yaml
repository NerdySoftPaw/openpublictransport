refresh_departures:
  name: Refresh Departures
  description: Manually refresh departure data from the API
  fields:
    entity_id:
      name: Entity
      description: The entity to refresh (optional - if not provided, all entities will be refreshed)
      required: false
      example: "sensor.openpublictransport_dusseldorf_hauptbahnhof"
      selector:
        entity:
          integration: openpublictransport
          domain: sensor

plan_trip:
  name: Plan Trip
  description: Plan a trip from A to B and get route options with connections
  fields:
    provider:
      name: Provider
      description: The transit provider (vrr, kvv, hvv, mvv, vvs, vagfr, bvg)
      required: true
      example: "vrr"
      selector:
        text:
    origin:
      name: Origin
      description: "Start stop name"
      required: true
      example: "Holthausen"
      selector:
        text:
    origin_city:
      name: Origin City
      description: "City of the start stop"
      required: true
      example: "Düsseldorf"
      selector:
        text:
    destination:
      name: Destination
      description: "Destination stop name"
      required: true
      example: "Hauptbahnhof"
      selector:
        text:
    destination_city:
      name: Destination City
      description: "City of the destination stop"
      required: true
      example: "Düsseldorf"
      selector:
        text:

check_delays:
  name: Check Delays
  description: Check for delays on a specific entity and fire an event if threshold exceeded
  fields:
    entity_id:
      name: Entity
      description: The departure sensor to check
      required: true
      selector:
        entity:
          integration: openpublictransport
          domain: sensor
    delay_threshold:
      name: Delay Threshold
      description: Minimum delay in minutes to trigger (default 5)
      required: false
      default: 5
      example: 3
      selector:
        number:
          min: 1
          max: 60
    line:
      name: Line Filter
      description: Only check a specific line (optional, e.g. U79)
      required: false
      example: "U79"
      selector:
        text:

announce_departure:
  name: Announce Departure
  description: Generate and optionally speak a station-style departure announcement
  fields:
    entity_id:
      name: Entity
      description: The departure sensor to announce
      required: true
      selector:
        entity:
          integration: openpublictransport
          domain: sensor
    index:
      name: Departure Index
      description: Which departure to announce (0 = next, 1 = second, etc.)
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10
    tts_service:
      name: TTS Service
      description: "TTS service to use for speaking (e.g. tts.google_translate_say, tts.cloud_say)"
      required: false
      example: "tts.google_translate_say"
      selector:
        text:
    media_player:
      name: Media Player
      description: "Media player entity to speak on (e.g. media_player.living_room)"
      required: false
      example: "media_player.living_room"
      selector:
        entity:
          domain: media_player
    language:
      name: Language
      description: "Announcement language (de = German station style, en = English)"
      required: false
      default: "de"
      selector:
        select:
          options:
            - "de"
            - "en"
